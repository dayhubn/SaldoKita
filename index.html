<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tabungan Denny & Nuri</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
    background: linear-gradient(135deg,#4e73df,#1cc88a);
    padding:20px 10px;
}

.container{
    max-width:420px;
    margin:auto;
    padding:0 10px;
}

.card{
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(15px);
    border-radius:20px;
    padding:20px;
    margin-bottom:15px;
    margin-left:5px;
    margin-right:5px;
    color:white;
}

.title{text-align:center;font-weight:600;margin-bottom:10px;}

select,input{
    width:100%;
    padding:12px;
    margin-bottom:10px;
    border-radius:12px;
    border:none;
    outline:none;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:14px;
    background:linear-gradient(135deg,#36d1dc,#5b86e5);
    color:white;
    font-weight:bold;
    cursor:pointer;
}

.total{text-align:center;font-size:28px;font-weight:bold;}

.stats{display:flex;justify-content:space-between;font-size:14px;}

canvas{margin-top:10px;}

.history-content{display:none;margin-top:10px;}

.history-item{
    background:rgba(255,255,255,0.2);
    padding:10px;
    border-radius:10px;
    margin-bottom:5px;
    font-size:13px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.delete-btn{
    background:red;
    border:none;
    color:white;
    border-radius:8px;
    padding:5px 8px;
    cursor:pointer;
    font-size:12px;
}
</style>
</head>

<body>
<div class="container">

<!-- INPUT -->
<div class="card">
<div class="title"> ~ بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ ~ </div>

<select id="nama">
<option>Denny</option>
<option>Nuri</option>
</select>

<select id="bulan">
<option>Jan</option><option>Feb</option><option>Mar</option>
<option>Apr</option><option>Mei</option><option>Jun</option>
<option>Jul</option><option>Agu</option><option>Sep</option>
<option>Okt</option><option>Nov</option><option>Des</option>
</select>

<select id="minggu">
<option>Minggu 1</option>
<option>Minggu 2</option>
<option>Minggu 3</option>
<option>Minggu 4</option>
</select>

<input type="text" id="nominal" placeholder="Masukkan nominal" oninput="formatInput(this)">

<button onclick="tambah()">+ Tambah Tabungan</button>
</div>

<!-- TOTAL -->
<div class="card">
<div class="total" id="total">Rp 0</div>

<div class="stats">
<div>Denny: <span id="denny">Rp 0</span></div>
<div>Nuri: <span id="nuri">Rp 0</span></div>
</div>

<canvas id="chart"></canvas>
</div>

<!-- RIWAYAT -->
<div class="card">
<div onclick="toggleHistory()" style="cursor:pointer; display:flex; justify-content:space-between;">
<span>📜 Riwayat</span>
<span id="arrow">▼</span>
</div>

<div class="history-content" id="history"></div>
</div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("tabungan")) || [];
let chart;

// FORMAT INPUT
function formatInput(input){
    let angka = input.value.replace(/[^0-9]/g, '');
    input.value = angka.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
}

// FORMAT RUPIAH
function rupiah(angka){
    return "Rp " + angka.toLocaleString("id-ID");
}

// TAMBAH
function tambah(){
    let nama = document.getElementById("nama").value;
    let bulan = document.getElementById("bulan").value;
    let minggu = document.getElementById("minggu").value;

    let raw = document.getElementById("nominal").value.replace(/\./g,'');
    let nominal = parseInt(raw);

    if(!nominal) return alert("Isi nominal!");

    data.push({nama,bulan,minggu,nominal});
    localStorage.setItem("tabungan", JSON.stringify(data));
    render();

    document.getElementById("nominal").value="";
}

// HAPUS DENGAN PASSWORD
function hapus(index){
    let sandi = prompt("Masukkan sandi untuk hapus:");
    if(sandi === "2006"){
        data.splice(index,1);
        localStorage.setItem("tabungan", JSON.stringify(data));
        render();
    }else{
        alert("Sandi salah!");
    }
}

// RENDER
function render(){
    let total=0, denny=0, nuri=0;
    let historyHTML="";
    let bulanan = {
        Jan:0,Feb:0,Mar:0,Apr:0,Mei:0,Jun:0,
        Jul:0,Agu:0,Sep:0,Okt:0,Nov:0,Des:0
    };

    let reversed = [...data].reverse();

    reversed.forEach((item,i)=>{
        total+=item.nominal;
        bulanan[item.bulan]+=item.nominal;

        if(item.nama==="Denny") denny+=item.nominal;
        else nuri+=item.nominal;

        let realIndex = data.length - 1 - i;

        historyHTML += `
        <div class="history-item">
            <span>${item.nama} - ${item.bulan} ${item.minggu} : ${rupiah(item.nominal)}</span>
            <button class="delete-btn" onclick="hapus(${realIndex})">🗑️</button>
        </div>`;
    });

    document.getElementById("total").innerText = rupiah(total);
    document.getElementById("denny").innerText = rupiah(denny);
    document.getElementById("nuri").innerText = rupiah(nuri);
    document.getElementById("history").innerHTML = historyHTML;

    renderChart(bulanan);
}

// CHART
function renderChart(bulanan){
    let ctx = document.getElementById("chart");

    if(chart) chart.destroy();

    chart = new Chart(ctx,{
        type:'line',
        data:{
            labels:Object.keys(bulanan),
            datasets:[{
                data:Object.values(bulanan),
                tension:0.4,
                fill:true
            }]
        },
        options:{
            plugins:{legend:{display:false}},
            scales:{y:{beginAtZero:true}}
        }
    });
}

// TOGGLE
function toggleHistory(){
    let el = document.getElementById("history");
    let arrow = document.getElementById("arrow");

    if(el.style.display==="block"){
        el.style.display="none";
        arrow.innerText="▼";
    }else{
        el.style.display="block";
        arrow.innerText="▲";
    }
}

// SYNC TAB
window.addEventListener("storage", () => {
    data = JSON.parse(localStorage.getItem("tabungan")) || [];
    render();
});

// INIT
render();
</script>

</body>
</html>
